<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" role="img" aria-labelledby="mtitle">
  <title id="mtitle">Four demo modules: pancake stack, Pac-Man maze, Romania map, 8-puzzle grid</title>
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(18,22,35,0.95)"/>
      <stop offset="100%" style="stop-color:rgba(8,10,18,0.98)"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="tileg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:rgba(167,139,250,0.75)"/>
      <stop offset="100%" style="stop-color:rgba(56,189,248,0.45)"/>
    </linearGradient>
  </defs>
  <rect width="880" height="200" rx="16" fill="#07080d"/>
  <rect x="8" y="8" width="206" height="184" rx="12" fill="url(#cardBg)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <rect x="230" y="8" width="206" height="184" rx="12" fill="url(#cardBg)" stroke="rgba(255,235,59,0.28)" stroke-width="1"/>
  <rect x="452" y="8" width="206" height="184" rx="12" fill="url(#cardBg)" stroke="rgba(45,212,191,0.3)" stroke-width="1"/>
  <rect x="674" y="8" width="198" height="184" rx="12" fill="url(#cardBg)" stroke="rgba(167,139,250,0.35)" stroke-width="1"/>
  <!-- Pancake -->
  <g transform="translate(28,52)">
    <rect x="20" y="88" width="140" height="10" rx="2" fill="url(#p1)"/>
    <rect x="35" y="72" width="110" height="10" rx="2" fill="#0ea5e9"/>
    <rect x="50" y="56" width="80" height="10" rx="2" fill="#38bdf8"/>
    <text x="90" y="38" text-anchor="middle" fill="#e8edf5" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Pancake</text>
    <text x="90" y="118" text-anchor="middle" fill="#8b95a8" font-family="system-ui,sans-serif" font-size="10">Flip &amp; sort</text>
  </g>
  <!-- Pac -->
  <g transform="translate(268,58)">
    <rect x="0" y="40" width="130" height="90" rx="6" fill="#1a4fd9" opacity="0.9"/>
    <circle cx="65" cy="85" r="18" fill="#ffeb3b"/>
    <polygon points="65,85 95,70 95,100" fill="#07080d"/>
    <circle cx="58" cy="80" r="2.5" fill="#07080d"/>
    <text x="65" y="28" text-anchor="middle" fill="#e8edf5" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Pac-Man</text>
  </g>
  <!-- Romania -->
  <g transform="translate(488,48)">
    <line x1="20" y1="100" x2="55" y2="70" stroke="rgba(94,234,212,0.7)" stroke-width="2"/>
    <line x1="55" y1="70" x2="100" y2="85" stroke="rgba(94,234,212,0.55)" stroke-width="2"/>
    <line x1="100" y1="85" x2="150" y2="55" stroke="rgba(94,234,212,0.65)" stroke-width="2"/>
    <circle cx="20" cy="100" r="6" fill="#38bdf8"/>
    <circle cx="150" cy="55" r="7" fill="#5eead4"/>
    <text x="85" y="32" text-anchor="middle" fill="#e8edf5" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Romania</text>
    <text x="85" y="130" text-anchor="middle" fill="#8b95a8" font-family="system-ui,sans-serif" font-size="10">Graph roads</text>
  </g>
  <!-- 8-puzzle mini -->
  <g transform="translate(718,54)">
    <text x="78" y="26" text-anchor="middle" fill="#e8edf5" font-family="system-ui,sans-serif" font-size="13" font-weight="600">8-puzzle</text>
    <g transform="translate(18,40)">
      <rect width="120" height="120" rx="8" fill="rgba(8,10,18,0.9)" stroke="rgba(167,139,250,0.4)"/>
      <g fill="url(#tileg)" stroke="rgba(56,189,248,0.2)">
        <rect x="6" y="6" width="34" height="34" rx="4"/>
        <rect x="43" y="6" width="34" height="34" rx="4"/>
        <rect x="80" y="6" width="34" height="34" rx="4"/>
        <rect x="6" y="43" width="34" height="34" rx="4"/>
        <rect x="43" y="43" width="34" height="34" rx="4" fill="rgba(30,35,50,0.85)" stroke-dasharray="3 2"/>
        <rect x="80" y="43" width="34" height="34" rx="4"/>
        <rect x="6" y="80" width="34" height="34" rx="4"/>
        <rect x="43" y="80" width="34" height="34" rx="4"/>
        <rect x="80" y="80" width="34" height="34" rx="4"/>
      </g>
    </g>
  </g>
</svg>
