<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-labelledby="title desc">
  <title id="title">CS170 Intro to AI  Visual search demos</title>
  <desc id="desc">Abstract search tree with glowing nodes on a dark grid background</desc>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c12"/>
      <stop offset="50%" style="stop-color:#07080d"/>
      <stop offset="100%" style="stop-color:#05060a"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.7"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="280" fill="url(#sky)"/>
  <g opacity="0.35">
    <path d="M0 40h900M0 72h900M0 104h900M0 136h900M0 168h900M0 200h900M0 232h900" stroke="#38bdf8" stroke-width="0.5" opacity="0.15"/>
    <path d="M0 0v280M32 0v280M64 0v280M96 0v280M128 0v280M160 0v280M192 0v280M224 0v280M256 0v280M288 0v280M320 0v280M352 0v280M384 0v280M416 0v280M448 0v280M480 0v280M512 0v280M544 0v280M576 0v280M608 0v280M640 0v280M672 0v280M704 0v280M736 0v280M768 0v280M800 0v280M832 0v280M864 0v280M896 0v280" stroke="#38bdf8" stroke-width="0.5" opacity="0.12"/>
  </g>
  <ellipse cx="450" cy="-20" rx="420" ry="140" fill="rgba(56,189,248,0.08)"/>
  <!-- search tree sketch -->
  <g stroke="url(#glowLine)" stroke-width="1.2" fill="none" opacity="0.55" stroke-dasharray="6 4">
    <path d="M120 220 L200 140"/>
    <path d="M120 220 L200 190"/>
    <path d="M200 140 L300 85"/>
    <path d="M200 140 L300 115"/>
    <path d="M200 190 L300 165"/>
    <path d="M300 85 L400 55"/>
    <path d="M300 115 L400 95"/>
  </g>
  <g filter="url(#blur)">
    <circle cx="120" cy="220" r="7" fill="#38bdf8"/>
    <circle cx="200" cy="140" r="6" fill="#22d3ee"/>
    <circle cx="200" cy="190" r="6" fill="#22d3ee"/>
    <circle cx="300" cy="85" r="6" fill="#a78bfa"/>
    <circle cx="300" cy="115" r="6" fill="#a78bfa"/>
    <circle cx="400" cy="55" r="7" fill="#f472b6"/>
    <circle cx="400" cy="95" r="6" fill="#34d399"/>
  </g>
  <text x="450" y="255" text-anchor="middle" fill="#8b95a8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" letter-spacing="0.06em">Interactive search · BFS · DFS · UCS</text>
</svg>
