# Netlify: set this folder as the site root (base directory) when connecting the repo,
# or deploy by dragging this folder — publish directory is the folder root.
[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
